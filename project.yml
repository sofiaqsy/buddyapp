name: BuddyApp
options:
  bundleIdPrefix: com.buddyapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  BuddyApp:
    type: application
    platform: iOS
    sources:
      - path: BuddyApp/Sources
      - path: BuddyApp/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.buddyapp.app
        INFOPLIST_FILE: BuddyApp/Sources/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: BuddyApp/BuddyApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: F1B3C2FB860069F1F09908A60D8F6F9478C56FB6
        CODE_SIGN_STYLE: Automatic
        NSLocationWhenInUseUsageDescription: "BuddyApp needs your location to unlock stickers at nearby places."
        NSLocationAlwaysAndWhenInUseUsageDescription: "BuddyApp uses your location in the background to notify you when you reach a new place."
